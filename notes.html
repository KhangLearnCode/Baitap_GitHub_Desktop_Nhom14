<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi chú - Quản lý học tập cá nhân</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Ghi chú cá nhân</h1>
            <p>Quản lý các ghi chú phục vụ học tập của bạn</p>
        </header>
        <main>
            <form id="note-form">
                <textarea id="note-input" placeholder="Nhập ghi chú..." required></textarea>
                <button type="submit">Thêm ghi chú</button>
            </form>
            <section id="notes-list">
                <!-- Danh sách ghi chú sẽ hiển thị  đây -->
            </section>
        </main>
    </div>
    <script>
        // Chức năng thêm ghi chú đơn giản (lưu trên giao diện)
        const form = document.getElementById('note-form');
        const input = document.getElementById('note-input');
        const notesList = document.getElementById('notes-list');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const noteText = input.value.trim();
            if (noteText) {
                const note = document.createElement('div');
                note.className = 'note';
                note.innerHTML = `<span>${noteText}</span><button class='delete-btn'>Xóa</button>`;
                notesList.prepend(note);
                input.value = '';
            }
        });

        notesList.addEventListener('click', function(e) {
            if (e.target.classList.contains('delete-btn')) {
                e.target.parentElement.remove();
            }
        });
    </script>
</body>
</html>
